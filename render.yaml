services:
  - type: web
    name: agent-marketplace
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python seed_db.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: HF_TOKEN
        sync: false          # You will paste this manually in the Render dashboard
      - key: HF_ENABLE_SEMANTIC_ROUTING
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.0"
